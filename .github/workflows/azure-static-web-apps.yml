name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Bundle data snapshots into API
        run: cp -r data api/data

      - name: Deploy via SWA CLI (provider=None workaround)
        # A Action Azure/static-web-apps-deploy@v1 exige SWA com provider=GitHub.
        # Nosso SWA foi criado sem --source, então provider=None — a Action
        # falha com "unknown exception". swa deploy CLI funciona com qualquer
        # provider; usa o mesmo deployment token.
        run: |
          npm install -g @azure/static-web-apps-cli
          swa deploy ./dist \
            --api-location ./api \
            --api-language python \
            --api-version 3.11 \
            --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} \
            --env production \
            --verbose silly

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
